---
name: Main CI/CD
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      OCTOPUS_SPACE: 'Default'
    steps:
      - uses: actions/checkout@v6
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set Version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build and Push the Image to Docker Hub
        uses: docker/build-push-action@v7
        env:
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/website:${{ env.VERSION }}

      - name: Create Env file for Octopus
        run: |
          cat > .docker/.env <<EOF
          WEBSITE_IMAGE=#{Website.Image}
          WEBSITE_TAG=$VERSION
          EOF

      - name: Login to Octopus
        id: login_to_octopus
        uses: OctopusDeploy/login@v2
        with:
          server: ${{ secrets.OCTOPUS_URL }}
          api_key: ${{ secrets.OCTOPUS_API_KEY }}

      - name: Package to Octopus Deploy
        uses: OctopusDeploy/create-zip-package-action@v4
        with:
          package_id: 'website'
          version: ${{ env.VERSION }}
          output_folder: './packaging'
          base_path: .docker
          files: |
            *.*
      - name: Push a package to Octopus Deploy
        uses: OctopusDeploy/push-package-action@v4
        with:
          packages: |
            packaging/*

      - name: Create a release in Octopus Deploy
        uses: OctopusDeploy/create-release-action@v4
        with:
          project: 'Personal Website'
          package_version: ${{ env.VERSION }}
          release_number: ${{ env.VERSION }}

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # This token is provided by Actions, you do not need to create your own token
        with:
          tag_name: ${{ env.VERSION }}
          release_name: Release ${{ env.VERSION }}
          body: |
            cat ReleaseNotes.md
          draft: false
          prerelease: false
