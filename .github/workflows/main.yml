---
name: Main CI/CD
on:
  push:
    branches:
      - main
      # TODO: remove this before merge to main
      - feature/deploy-with-octopus
jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      OCTOPUS_SPACE: 'Default'
    steps:
      - uses: actions/checkout@v6
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set Version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build and Push the Image to Docker Hub
        uses: docker/build-push-action@v7
        env:
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/website:${{ env.VERSION }}

      - name: Create Env file for Octopus
        run: |
          cat > .docker/.env <<EOF
          WEBSITE_IMAGE=#{Website.Image}
          #TODO: fix this later
          WEBSITE_TAG=0.1.0
          EOF

      - name: Login to Octopus
        id: login_to_octopus
        uses: OctopusDeploy/login@v2
        with:
          server: ${{ secrets.OCTOPUS_URL }}
          api_key: ${{ secrets.OCTOPUS_API_KEY }}

      - name: Package to Octopus Deploy
        uses: OctopusDeploy/create-zip-package-action@v4
        with:
          package_id: 'website'
          version: ${{ env.VERSION }}
          output_folder: './packaging'
          base_path: .docker
          files: |
            *.*
      - name: Push a package to Octopus Deploy
        uses: OctopusDeploy/push-package-action@v4
        with:
          packages: |
            packaging/*

      - name: Create a release in Octopus Deploy
        uses: OctopusDeploy/create-release-action@v4
        with:
          project: 'Personal Website'
